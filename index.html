<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaquetáChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* MODO CLARO (Verdes suaves y armónicos) */
:root{
  --bg0:#ffffff;
  --bg1:#f5fbf7;
  --bg2:#e8f4ed;
  --bg3:#d1e8da;
  --gr1:#2b7a4b;
  --gr2:#429f6b;
  --gr3:#65c18c;
  --gr4:#e2f2e8;
  --tx0:#182e22;
  --tx1:#2a4736;
  --tx2:#527560;
  --tx3:#82a38f;
  --bd1:rgba(66,159,107,0.12);
  --bd2:rgba(66,159,107,0.25);
  --bd3:rgba(66,159,107,0.4);
  --shadow:0 4px 16px rgba(43,122,75,0.06);
  --shadow-lg:0 8px 32px rgba(43,122,75,0.12);
}

/* MODO OSCURO */
body.dark {
  --bg0:#0f1411;
  --bg1:#161e19;
  --bg2:#222e26;
  --bg3:#2e3e34;
  --gr1:#429f6b; 
  --gr2:#65c18c;
  --gr4:#1c2b22; 
  --tx0:#e8f0ec;
  --tx1:#cbdcd1;
  --tx2:#9db5a6;
  --tx3:#708a7a;
  --bd1:rgba(101,193,140,0.1);
  --bd2:rgba(101,193,140,0.2);
  --shadow:0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.7);
}

body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg0);color:var(--tx0);min-height:100vh;transition:background 0.3s, color 0.3s;}

/* ── CARGA ── */
#screen-load{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg0)}
.spin{width:36px;height:36px;border:2px solid var(--bd2);border-top-color:var(--gr2);border-radius:50%;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(0.94)}to{opacity:1;transform:none}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-18px) rotate(5deg)}}
@keyframes wave1{0%,100%{d:path("M0,24 C200,6 400,42 600,24 C800,6 1000,42 1200,24 C1400,6 1600,42 1800,24 L1800,48 L0,48 Z")}50%{d:path("M0,32 C200,48 400,8 600,32 C800,48 1000,8 1200,32 C1400,48 1600,8 1800,32 L1800,48 L0,48 Z")}}
@keyframes wave2{0%,100%{d:path("M0,32 C300,14 600,46 900,32 C1200,14 1500,46 1800,32 L1800,48 L0,48 Z")}50%{d:path("M0,40 C300,48 600,16 900,40 C1200,48 1500,16 1800,40 L1800,48 L0,48 Z")}}

/* ── LOGIN ── */
#screen-login{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg3) 50%,var(--bg0) 100%);position:relative;overflow:hidden}
#screen-login.show{display:flex}
#screen-app{display:none}
#screen-app.show{display:block}
.lcard{position:relative;z-index:2;width:380px;max-width:92vw;text-align:center;background:var(--bg0);border-radius:24px;padding:2.5rem 2rem;box-shadow:0 20px 60px rgba(0,0,0,0.08),0 0 0 1px var(--bd1)}
.l-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gr4);border:1px solid var(--bd2);border-radius:20px;padding:5px 14px;margin-bottom:1.8rem}
.l-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--gr2);animation:pulse 2s infinite}
.l-badge-txt{font-family:'Outfit',sans-serif;font-size:0.7rem;color:var(--gr1);font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.l-logo{font-family:'Outfit',sans-serif;font-size:2.4rem;font-weight:800;color:var(--tx0);line-height:1;margin-bottom:0.4rem; letter-spacing:-0.5px}
.l-logo span{color:var(--gr2)}
.l-sub{font-size:0.9rem;color:var(--tx2);margin-bottom:1.8rem;line-height:1.6}
.l-feats{display:flex;justify(intent:center;gap:6px;flex-wrap:wrap;margin-bottom:1.8rem}
.l-feat{background:var(--gr4);border:1px solid var(--bd1);border-radius:20px;padding:4px 12px;font-size:0.7rem;color:var(--tx1);font-weight:600}
.l-btn{display:flex;align-items:center;gap:12px;width:100%;padding:0.9rem 1.2rem;border-radius:12px;border:1px solid var(--bd2);background:var(--bg0);color:var(--tx0);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow)}

/* ── TOPBAR ── */
.topbar{background:var(--bg0);border-bottom:1px solid var(--bg2);color:var(--tx0);display:flex;align-items:center;padding:0 1.6rem;height:64px;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(43,122,75,0.04)}
.logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.3rem;flex-shrink:0;color:var(--tx0); letter-spacing:-0.5px}
.logo span{color:var(--gr2)}
.ntabs{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.ntab{background:none;border:none;color:var(--tx2);padding:0 14px;height:64px;font-size:0.85rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s}
.ntab.active{color:var(--gr1);border-bottom-color:var(--gr2);font-weight:700}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.uav{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gr1),var(--gr2));display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;overflow:hidden;border:2px solid var(--gr4);flex-shrink:0;color:#fff}
.obtn{background:var(--bg2);border:1px solid var(--bd1);color:var(--tx2);border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.page{display:none}.page.active{display:block}

/* ══════════════════════
   HERO BANNER
   ══════════════════════ */
.hero-banner{
  position:relative;overflow:hidden;
  background:linear-gradient(145deg, #1b4332 0%, #2b7a4b 50%, #429f6b 100%);
  padding:52px 20px 72px;
}
/* INTEGRACIÓN CATEDRAL: Muy difuminada de fondo */
.catedral-bg {
  position:absolute; inset:0; pointer-events:none; 
  background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/44/Catedral_de_Florencia_Caqueta.jpg'); /* Basado en image_1.png */
  background-size: cover; background-position: center; 
  opacity: 0.08; /* Muy difuminado, casi invisible */
  filter: blur(8px) saturate(0.2); /* Difuminado extra */
  z-index: 0;
}
.hero-wave{position:absolute;bottom:0;left:0;right:0;height:48px;pointer-events:none}
.hero-wave svg{width:100%;height:100%}
.w1{animation:wave1 10s ease-in-out infinite}
.w2{animation:wave2 12s ease-in-out infinite}

.hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:6px 16px;margin-bottom:16px;backdrop-filter:blur(4px)}
.hero-eyebrow-txt{font-family:'Outfit',sans-serif;font-size:0.7rem;color:#e8f4ed;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
.hero-h1{font-family:'Outfit',sans-serif;font-size:3rem;font-weight:800;color:#fff;line-height:1.1;margin-bottom:14px;text-shadow:0 2px 20px rgba(0,0,0,0.15); letter-spacing:-1px}
.hero-h1-sub{font-size:0.95rem;color:rgba(255,255,255,0.85);line-height:1.65;max-width:480px;margin-bottom:26px}
.hero-stats{display:flex;gap:36px}
.hero-stat-val{font-family:'Outfit',sans-serif;font-size:2.2rem;font-weight:800;color:#fff;line-height:1}

/* ══════════════════════
   INICIO
   ══════════════════════ */
.inicio-wrap{max-width:1200px;margin:0 auto;padding:32px 20px;display:grid;grid-template-columns:1fr 290px;gap:26px}
.h-tag{font-family:'Outfit',sans-serif;display:inline-block;font-size:0.65rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.noticias-grid{display:grid;grid-template-columns:1.8fr 1fr;gap:16px}
.noticia-main{background:var(--bg0);border:1px solid var(--bg2);border-radius:20px;overflow:hidden;cursor:pointer;transition:transform 0.35s,box-shadow 0.3s;box-shadow:var(--shadow)}
.noticia-stack{display:flex;flex-direction:column;gap:12px}
.noticia-mini{background:var(--bg0);border:1px solid var(--bg2);border-radius:16px;display:flex;gap:14px;align-items:center;padding:14px;cursor:pointer;transition:transform 0.3s}
.widget{background:var(--bg0);border:1px solid var(--bg2);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}

/* ══════════════════════
   CHAT — 3 paneles (6 salas)
   ══════════════════════ */
.chat-layout{display:grid;grid-template-columns:230px 1fr 220px;height:calc(100vh - 64px);overflow:hidden}
.panel-salas{background:var(--bg1);border-right:1px solid var(--bg2);overflow-y:auto;display:flex;flex-direction:column}
.panel-salas-header{font-family:'Outfit',sans-serif;padding:16px 18px;font-size:0.7rem;font-weight:700;color:var(--tx2);letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid var(--bg2)}
.sala{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;border-left:4px solid transparent;transition:all 0.18s}
.sala.active{background:var(--bg2);border-left-color:var(--gr2)}
.panel-centro{display:flex;flex-direction:column;height:calc(100vh - 64px);overflow:hidden;background:var(--bg0)}
.chat-header{background:var(--bg0);border-bottom:1px solid var(--bg2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.mr2{display:flex;gap:10px;align-items:flex-end;max-width:76%}
.mr2.me{align-self:flex-end;flex-direction:row-reverse}
.bub{background:var(--bg1);border:1px solid var(--bg2);border-radius:18px 18px 18px 4px;padding:10px 16px;font-size:0.9rem;box-shadow:var(--shadow)}
.cft{background:var(--bg0);border-top:1px solid var(--bg2);padding:14px 20px}
.mi{flex:1;border:2px solid var(--bg2);border-radius:18px;padding:12px 18px;font-size:0.9rem;outline:none;background:var(--bg1);font-family:'Plus Jakarta Sans',sans-serif;}
.panel-usuarios{background:var(--bg0);border-left:1px solid var(--bg2);overflow-y:auto}

/* EMOJI BARRA */
.emoji-bar { display: none; gap: 8px; padding: 10px 14px; background: var(--bg1); border: 1px solid var(--bg2); border-radius: 14px; margin-bottom: 10px; flex-wrap: wrap; box-shadow: var(--shadow); }
.emoji-bar.show { display: flex; }
.emj-btn { cursor: pointer; font-size: 1.3rem; padding: 6px; border-radius: 8px; transition: transform 0.2s, background 0.2s; user-select: none; }
.emj-btn:hover { transform: scale(1.2); background: var(--bg2); }

/* CHAT PRIVADO */
.priv-chat{position:fixed;bottom:20px;right:20px;width:340px;background:var(--bg0);border:1px solid var(--bd2);border-radius:24px;box-shadow:var(--shadow-lg)}
.priv-header{background:var(--bg1);border-bottom:1px solid var(--bg2);padding:14px 18px;display:flex;align-items:center}
.priv-inp{flex:1;border:2px solid var(--bg2);border-radius:14px;padding:8px 14px;font-size:0.85rem;outline:none;background:var(--bg1);font-family:'Plus Jakarta Sans',sans-serif;}
</style>
</head>
<body>
<div id="screen-load"><div class="spin"></div></div>
<div id="screen-app">
  <nav class="topbar"></nav>
  <div class="page active" id="page-inicio">
    <div class="hero-banner">
      <div class="catedral-bg"></div>
      </div>
  </div>
  <div class="page" id="page-chat">
    <div class="chat-layout">
      <div class="panel-salas">
        <div class="panel-salas-header">Salas de Chat</div>
        <div class="sala active" onclick="cs('general','Plaza General',this)"><span class="sala-emoji">🍻</span><span class="sala-nombre">Plaza General</span></div>
        <div class="sala" onclick="cs('nocturno','Café Nocturno',this)"><span class="sala-emoji">☕</span><span class="sala-nombre">Café Nocturno</span></div>
        <div class="sala" onclick="cs('debates','Debates',this)"><span class="sala-emoji">🗣️</span><span class="sala-nombre">Debates</span></div>
        <div class="sala" onclick="cs('naturaleza','Naturaleza',this)"><span class="sala-emoji">🌿</span><span class="sala-nombre">Naturaleza</span></div>
        <div class="sala" onclick="cs('deportes','Deportes',this)"><span class="sala-emoji">🏐</span><span class="sala-nombre">Deportes</span></div>
        <div class="sala" onclick="cs('mercado','Mercado',this)"><span class="sala-emoji">🛒</span><span class="sala-nombre">Mercado</span></div>
      </div>
      <div class="panel-centro">
        <div class="cft">
          <div id="emoji-bar-main" class="emoji-bar">
            <span class="emj-btn" onclick="putEmoji('minp','😀')">😀</span><span class="emj-btn" onclick="putEmoji('minp','😂')">😂</span><span class="emj-btn" onclick="putEmoji('minp','😎')">😎</span>
          </div>
          <div class="mt">
            <button class="mtl" onclick="document.getElementById('emoji-bar-main').classList.toggle('show')">😄 Emoji</button>
          </div>
          <div class="ir"><textarea id="minp" class="mi" rows="1" placeholder="Escribe tu mensaje..."></textarea></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
