<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaquetáChat - Light Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#f0f2f1; /* Gris verdoso muy claro */
  --bg1:#ffffff; /* Blanco puro */
  --bg2:#f9fafb; /* Fondo para mensajes */
  --gr1:#15803d; /* Verde bosque */
  --gr2:#22c55e; /* Verde selva */
  --gr3:#16a34a; /* Verde acento */
  --tx0:#111827; /* Texto negro */
  --tx1:#4b5563; /* Gris principal */
  --tx2:#6b7280; /* Gris secundario */
  --tx3:#9ca3af;
  --bd1:rgba(0,0,0,0.05);
  --bd2:rgba(22,163,74,0.15);
  --shadow:0 2px 10px rgba(0,0,0,0.05);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--tx0);min-height:100vh}

/* LOADER */
#screen-load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg1);z-index:999}
.spin{width:40px;height:40px;border:3px solid #eee;border-top-color:var(--gr2);border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* LOGIN */
#screen-login{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--bg0);position:relative}
#screen-login.show{display:flex}
#screen-app{display:none}
#screen-app.show{display:block}

.lcard{background:var(--bg1);padding:40px;border-radius:24px;box-shadow:0 20px 40px rgba(0,0,0,0.05);width:380px;text-align:center;border:1px solid var(--bd1)}
.l-logo{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;color:var(--tx0);margin-bottom:10px}
.l-logo span{color:var(--gr2)}
.l-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px;border-radius:12px;border:1px solid #e5e7eb;background:white;font-weight:600;cursor:pointer;transition:0.2s}
.l-btn:hover{background:#f9fafb;border-color:var(--gr2)}

/* TOPBAR */
.topbar{background:var(--bg1);border-bottom:1px solid #eee;display:flex;align-items:center;padding:0 20px;height:64px;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem}
.logo span{color:var(--gr2)}
.ntabs{display:flex;margin-left:30px;gap:5px;flex:1}
.ntab{background:none;border:none;padding:10px 15px;cursor:pointer;font-weight:600;color:var(--tx2);border-radius:8px}
.ntab.active{color:var(--gr1);background:var(--bd2)}

/* CHAT LAYOUT */
.chat-layout{display:grid;grid-template-columns:240px 1fr 240px;height:calc(100vh - 64px);background:var(--bg1)}
.panel-salas, .panel-usuarios{border-inline:1px solid #eee; padding:20px; overflow-y:auto}
.panel-centro{background:var(--bg2);display:flex;flex-direction:column}
.chat-header{padding:15px 20px;background:var(--bg1);border-bottom:1px solid #eee}
.msgs{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}

/* BURBUJAS CLARAS */
.bub{background:var(--bg1);color:var(--tx0);border:1px solid #eee;padding:10px 14px;border-radius:14px;box-shadow:var(--shadow)}
.mr2.me .bub{background:var(--gr1);color:white;border:none}
.cft{padding:15px;background:var(--bg1);border-top:1px solid #eee}
.mi{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;outline:none}

/* HERO BANNER ILUMINADO */
.hero-banner{background:linear-gradient(135deg, #dcfce7 0%, #ffffff 100%);padding:50px 20px;border-bottom:1px solid #eee;text-align:center}
.hero-h1{font-family:'Syne',sans-serif;font-size:2.8rem;color:var(--tx0)}

</style>
</head>
<body>

<div id="screen-load"><div class="spin"></div></div>

<div id="screen-login">
  <div class="lcard">
    <div class="l-logo">Caquet<span>á</span>Chat</div>
    <p style="color:var(--tx2); margin-bottom:25px">Bienvenido a la comunidad del Caquetá</p>
    <button id="btn-login" class="l-btn">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
      <span>Continuar con Google</span>
    </button>
  </div>
</div>

<div id="screen-app">
  <nav class="topbar">
    <div class="logo">Caquet<span>á</span>Chat</div>
    <div class="ntabs">
      <button class="ntab active" data-p="inicio">Inicio</button>
      <button class="ntab" data-p="chat">Chat</button>
    </div>
    <div class="topbar-right" style="display:flex; align-items:center; gap:10px">
      <div id="uav" style="width:32px; height:32px; border-radius:50%; background:#ddd; overflow:hidden"></div>
      <button id="btn-out" style="background:none; border:none; cursor:pointer">Salir</button>
    </div>
  </nav>

  <div class="page active" id="page-inicio">
    <div class="hero-banner">
      <h1 class="hero-h1">Conecta con tu <span>región</span></h1>
      <p style="margin:15px 0 25px">Noticias, comunidad y chat en tiempo real.</p>
      <button onclick="gp('chat')" style="background:var(--gr1); color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:700">Entrar al Chat</button>
    </div>
  </div>

  <div class="page" id="page-chat">
    <div class="chat-layout">
      <div class="panel-salas">
        <h4 style="margin-bottom:15px">Salas</h4>
        <div class="sala active" onclick="cs('plaza','Plaza Caquetá',this)" style="padding:10px; border-radius:8px; cursor:pointer; background:var(--bd2); color:var(--gr1); font-weight:700">🌿 Plaza Caquetá</div>
      </div>
      <div class="panel-centro">
        <div class="chat-header"><strong id="rnm">Plaza Caquetá</strong></div>
        <div class="msgs" id="msgs"></div>
        <div class="cft">
            <div style="display:flex; gap:10px">
                <input id="minp" class="mi" placeholder="Escribe un mensaje...">
                <button onclick="enviar()" style="background:var(--gr1); color:white; border:none; padding:0 20px; border-radius:10px; cursor:pointer">➤</button>
            </div>
        </div>
